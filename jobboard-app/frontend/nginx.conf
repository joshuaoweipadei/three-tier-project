server {
    listen 80;
    server_name _;

    # Where Nginx looks for files to serve
    root  /usr/share/nginx/html;
    index index.html;

    # Health check
    # AWS ALB pings this every 30s to check if the container is alive
    # Returns "ok" instantly without touching the filesystem
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # API proxy → backend
    # Any request starting with /api/ gets forwarded to the backend Service
    # "backend-service" is the Kubernetes Service name — Kubernetes DNS
    # resolves it to the backend pod's IP automatically
    # This means the browser never directly talks to the backend
    location /api/ {
        proxy_pass         http://backend-service:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts for slow API responses
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # WebSocket proxy → backend
    # WebSocket connections need special headers: Upgrade + Connection
    # Without these, the connection gets downgraded to HTTP and breaks
    # Your real-time job status updates depend on this block
    location /ws {
        proxy_pass         http://backend-service:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # WebSocket connections stay open — need a long timeout
        # 3600s = 1 hour before Nginx closes an idle connection
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # React Router support
    # This is the most critical line for a React SPA
    # Without it: refreshing /jobs/123 returns a 404 because Nginx
    # looks for a file called "jobs/123" which doesn't exist
    # With it: Nginx always serves index.html and React Router handles the URL
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    # Vite adds a content hash to JS/CSS filenames (e.g. main.a3f2c1.js)
    # So we can cache them for 1 year — if the file changes, the hash changes
    # and the browser fetches the new file automatically
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    # These protect against common web attacks
    # X-Frame-Options: prevents your site being embedded in an iframe (clickjacking)
    # X-Content-Type-Options: prevents browsers guessing file types (MIME sniffing)
    # Referrer-Policy: controls how much URL info is sent to other sites
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header X-XSS-Protection       "1; mode=block"        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip compression
    # Compresses responses before sending — reduces bandwidth by ~70%
    # Makes your app load faster, especially on mobile
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json
                      application/javascript text/xml application/xml
                      image/svg+xml;
}