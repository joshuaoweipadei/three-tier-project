apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jobboard
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/joshuaoweipadei/three-tier-project.git
    targetRevision: main
    path: k8s_manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: jobboard

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true