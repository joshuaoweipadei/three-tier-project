apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: jobboard
  labels:
    app: jobboard-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobboard-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: jobboard-frontend
    spec:
      containers:
        - name: frontend
          image: 459499397949.dkr.ecr.ca-central-1.amazonaws.com/jobboard-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"