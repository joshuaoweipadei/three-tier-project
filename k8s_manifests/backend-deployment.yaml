apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: jobboard
  labels:
    app: jobboard-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobboard-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: jobboard-backend
    spec:
      containers:
        - name: backend
          image: 459499397949.dkr.ecr.ca-central-1.amazonaws.com/jobboard-backend:latest
          # Always pull latest image — important for deployments
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          # Load non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: jobboard-config
          # Load sensitive config from Secret
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: jobboard-secrets
                  key: MONGODB_URI
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: jobboard-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: jobboard-secrets
                  key: JWT_REFRESH_SECRET
          # Liveness: restart container if this fails 3 times
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          # Readiness: stop sending traffic if this fails
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"